services:
  redis:
    image: redis:7.4.5-alpine
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 1s
      timeout: 3s
      retries: 30

  app:
    build: .
    depends_on:
      redis:
        condition: service_healthy
    environment:
      E2E_REDIS_HOST: redis
      E2E_REDIS_PORT: '6379'
      E2E_REDIS_KEY_PREFIX: '{graphql-e2e}:'
