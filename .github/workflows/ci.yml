name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:
    inputs:
      skip_e2e:
        description: Skip installed-package end-to-end tests
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.9.3

      - name: Install dependencies
        run: deno install --frozen

      - name: Check formatting
        run: deno fmt --check

      - name: Lint
        run: deno lint

      - name: Type-check
        run: deno task typecheck

      - name: Build
        run: deno task build

      - name: Run unit tests
        run: deno task test --runInBand

  e2e:
    name: Installed-package e2e
    needs: unit
    if: ${{ ! inputs.skip_e2e }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.9.3

      - name: Install dependencies
        run: deno install --frozen

      - name: Check e2e fixtures
        run: |
          deno fmt --check --config test/e2e/http-app/deno.json test/e2e/http-app
          deno lint --config test/e2e/http-app/deno.json test/e2e/http-app
          deno check --config test/e2e/http-app/deno.json test/e2e/http-app/src/*.ts test/e2e/http-app/test/*.ts
          deno fmt --check --config test/e2e/graphql-app/deno.json test/e2e/graphql-app
          deno lint --config test/e2e/graphql-app/deno.json test/e2e/graphql-app
          deno check --config test/e2e/graphql-app/deno.json test/e2e/graphql-app/src/*.ts test/e2e/graphql-app/test/*.ts

      - name: Run installed-package e2e tests
        run: deno task test:e2e
